<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Direct Proposal</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeccf);
      color: #222;
      overflow: hidden;
    }
    .wrap {
      width: min(92vw, 720px);
      background: rgba(255,255,255,0.9);
      border-radius: 28px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.14);
      position: relative;
      z-index: 2;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.05;
    }
    p {
      font-size: 1.08rem;
      line-height: 1.6;
      margin: 0 auto 24px;
      max-width: 560px;
    }
    .heart {
      font-size: 3rem;
      margin-bottom: 14px;
      animation: pulse 1.4s infinite;
    }
    .btns {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }
    .form {
      margin: 28px auto 0;
      width: min(100%, 560px);
      display: grid;
      gap: 16px;
      text-align: left;
    }
    .form label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 1rem;
      font-weight: 600;
    }
    .form input,
    .form textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #d8d8d8;
      border-radius: 14px;
      font: inherit;
      background: white;
      color: #222;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .form input:focus,
    .form textarea:focus {
      border-color: #ff4d88;
      box-shadow: 0 0 0 4px rgba(255, 77, 136, 0.12);
    }
    .form textarea {
      resize: vertical;
      min-height: 120px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .row {
        grid-template-columns: 1fr;
      }
      .wrap {
        padding: 32px 20px;
      }
      h1 {
        font-size: 2.5rem;
      }
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }
    button:hover { transform: translateY(-2px); }
    .yes { background: #ff4d88; color: white; }
    .maybe { background: #ffd65a; color: #222; }
    .no { background: #efefef; color: #222; position: relative; }
    .msg {
      margin-top: 26px;
      min-height: 56px;
      font-size: 1.12rem;
      font-weight: 600;
    }
    .tiny {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #666;
    }
    .floating-heart {
      position: fixed;
      font-size: 20px;
      animation: floatUp 2.4s linear forwards;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-180px) scale(1.6); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="heart">📋</div>
    <h1>Girlfriend Application</h1>
    <p>
      Fill this out properly.
      Strong applications will be reviewed promptly by Lucas (Harvey) Kirazci.
    </p>

    <form action="https://formspree.io/f/xaqlqbek" method="POST" class="form">
      <input type="hidden" name="_subject" value="New Girlfriend Application" />

      <div class="row">
        <label>
          Full Name
          <input type="text" name="Full Name" required />
        </label>

        <label>
          Email
          <input type="email" name="Email" required />
        </label>
      </div>

      <div class="row">
        <label>
          Phone Number
          <input type="text" name="Phone Number" required />
        </label>

        <label>
          Age
          <input type="number" name="Age" required />
        </label>
      </div>

      <label>
        Why are you applying?
        <textarea name="Why are you applying?" rows="4" required></textarea>
      </label>

      <div class="row">
        <label>
          Best trait
          <input type="text" name="Best trait" required />
        </label>

        <label>
          Ideal first date
          <input type="text" name="Ideal first date" required />
        </label>
      </div>

      <label>
        Final statement
        <textarea name="Final statement" rows="4" required></textarea>
      </label>

      <div class="btns">
        <button class="yes" type="submit">submit application</button>
      </div>
    </form>

    <div class="msg" id="msg"></div>
    <div class="tiny">Lucas (Harvey) Kirazci</div>
  </div>

  <script>
    const form = document.querySelector('form');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', () => {
      msg.textContent = 'Submitting application.';
    });
  </script>
</body>
</html>
